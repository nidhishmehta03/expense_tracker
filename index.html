<!DOCTYPE html>
<html>
<head>
<title>Finance Expense Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">💰 Personal Finance Dashboard</h1>

<div class="dashboard">

<div class="summary">

<div class="card income">
<h3>Total Income</h3>
<p id="money-plus">$0</p>
</div>

<div class="card expense">
<h3>Total Expense</h3>
<p id="money-minus">$0</p>
</div>

<div class="card balance">
<h3>Balance</h3>
<p id="balance">$0</p>
</div>

</div>


<div class="middle">

<div class="add-transaction">

<h3>Add Transaction</h3>

<form id="form">

<input type="text" id="text" placeholder="Description">

<input type="number" id="amount" placeholder="Amount (+income / -expense)">

<button>Add</button>

</form>

</div>


<div class="chart-box">

<h3>Expense Overview</h3>

<p>📊 Chart coming soon</p>

</div>

</div>


<div class="history">

<h3>Transaction History</h3>

<ul id="list"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
